<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>SharedHabits 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .ios-nav-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    padding: 0 5px;
  }

  .nav-item {
    background: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 18px;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none !important;
    color: #1c1c1e !important;
    font-weight: 500;
    font-size: 15px;
    position: relative;
    transition: transform 0.1s ease;
  }

  .nav-item:active {
    transform: scale(0.96);
    background: rgba(255, 255, 255, 0.7);
  }

  .nav-icon {
    font-size: 18px;
  }

  /* Индикатор уведомлений (Красный кружок) */
  .badge-count {
    position: absolute;
    top: -5px;
    right: -5px;
    background: #ff3b30; /* Apple Red */
    color: white;
    font-size: 12px;
    font-weight: bold;
    min-width: 20px;
    height: 20px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
    border: 2px solid #f2f2f7; /* Цвет фона страницы для "отрыва" */
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

    :root {
      --ios-bg: #f2f2f7;
      --ios-accent: #007AFF;
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.3);
    }

    body {
      margin: 0;
      font-family: -apple-system, "SF Pro Display", "SF Pro Text", sans-serif;
      background: linear-gradient(135deg, #f2f2f7 0%, #e5e5ea 100%);
      color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .content-max {
      max-width: 420px;
      margin: auto;
      width: 100%;
      padding: 20px;
    }

    /* iOS 26 Glassmorphism Effect */
    .ios-glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      padding: 24px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ios-header {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 30px;
    }

    .ios-input {
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.05);
      background: rgba(255, 255, 255, 0.5);
      padding: 14px 16px;
      font-size: 17px;
      transition: background 0.2s;
    }

    .ios-input:focus {
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
      border-color: var(--ios-accent);
    }

    .ios-btn-main {
      width: 100%;
      border-radius: 18px;
      background: var(--ios-accent);
      color: #fff;
      font-weight: 600;
      padding: 14px;
      border: none;
      margin-top: 15px;
      transition: transform 0.1s;
    }

    .ios-btn-main:active {
      transform: scale(0.97);
    }

    .ios-link-sub {
      color: var(--ios-accent);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      display: block;
      text-align: center;
      margin-top: 20px;
      cursor: pointer;
    }

    /* Анимации переключения */
    .hidden { display: none; }
    
    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="content-max">
    <div class="fade-in">
  <!-- <header class="ios-header" style="text-align: left; padding-left: 10px;">Привычки</header> -->

  <nav class="ios-nav-grid mb-3">
    <a href="/habits" class="nav-item">
      <span class="nav-icon"></span>
      <span class="nav-label">Главная</span>
    </a>
    <a href="/profile" class="nav-item">
      <span class="nav-icon"></span>
      <span class="nav-label">Профиль</span>
    </a>
    <a href="/invites" class="nav-item">
      <span class="nav-icon"></span>
      <span class="nav-label">Уведомления</span>
      <span id="inviteBadge" class="badge-count" style="display: none;">0</span>
    </a>
  </nav>
</div>
  {% block content %}{% endblock %}
</div>

<script>
  function checkInvites() {
  api('/invites', 'GET').then(data => {
    const badge = document.getElementById('inviteBadge');
    // Предполагаем, что data — это массив приглашений
    if (data && data.length > 0) {
      badge.innerText = data.length;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
  }).catch(err => console.error('Ошибка проверки приглашений:', err));
}
checkInvites(); // Проверяем при загрузке страницы
  function getToken() { return localStorage.getItem('access_token'); }
  function setToken(t) { localStorage.setItem('access_token', t); }
  
  function api(path, method='GET', body=null) {
    const headers = { 'Content-Type': 'application/json' };
    const token = getToken();
    if (token) headers['Authorization'] = 'Bearer ' + token;
    return fetch('/api' + path, { method, headers, body: body ? JSON.stringify(body) : null })
      .then(async res => { 
        const json = await res.json(); 
        if (!res.ok) throw json; 
        return json; 
      });
  }
</script>
</body>
</html>
