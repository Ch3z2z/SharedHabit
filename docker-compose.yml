version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sharedhabits_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: SharedHabit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sharedhabits_net

  web:
    build: .
    container_name: sharedhabits_web
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/SharedHabit
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - sharedhabits_net

volumes:
  postgres_data:

networks:
  sharedhabits_net:
    driver: bridge
